<!DOCTYPE html>
<html>
<head>
  <title>YouTube Clone</title>
  <style>
    body { font-family: Arial; background: #0f0f0f; color: white; padding: 20px; }
    input { padding: 12px; width: 400px; border-radius: 20px; border: none; }
    button { padding: 12px 24px; border-radius: 20px; background: #ff0000; color: white; border: none; cursor: pointer; }
    .video { display: inline-block; margin: 10px; cursor: pointer; width: 300px; }
    .video img { width: 100%; border-radius: 10px; }
  </style>
</head>
<body>
  <h1>🎬 My YouTube Clone</h1>
  <input id="searchInput" placeholder="Search videos..." />
  <button onclick="searchVideos()">Search</button>
  <div id="results"></div>
  <div id="player"></div>

  <script>
    async function searchVideos() {
      const query = document.getElementById('searchInput').value;
      const res = await fetch(`/.netlify/functions/search?q=${query}`);
      const data = await res.json();
      
      if (data.error) return alert('Quota error!');
      
      const container = document.getElementById('results');
      container.innerHTML = data.items.map(item => `
        <div class="video" onclick="playVideo('${item.id.videoId}')">
          <img src="${item.snippet.thumbnails.medium.url}" />
          <h4>${item.snippet.title}</h4>
          <p style="color:gray;">${item.snippet.channelTitle}</p>
        </div>
      `).join('');
    }

    function playVideo(id) {
      document.getElementById('player').innerHTML = `
        <iframe width="800" height="450" src="https://www.youtube.com/embed/${id}" frameborder="0" allowfullscreen></iframe>
      `;
    }
  </script>
</body>
</html>
